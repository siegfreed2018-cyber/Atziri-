    <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Atziri ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:linear-gradient(to bottom,#020111,#191970);
font-family:'Segoe UI',sans-serif;
color:white;
height:100vh;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:brillar 2s infinite alternate;
}

@keyframes brillar{
from{opacity:.2}
to{opacity:1}
}

.luna{
position:absolute;
top:60px;
right:120px;
width:120px;
height:120px;
background:#fff;
border-radius:50%;
box-shadow:0 0 60px white;
}

.contenedor{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
font-size:60px;
margin-bottom:20px;
animation:aparecer 2s;
}

h2{
font-size:30px;
color:#ffd1dc;
}

#texto{
margin-top:40px;
font-size:25px;
min-height:60px;
}

button{
margin-top:40px;
padding:15px 40px;
border:none;
border-radius:50px;
font-size:20px;
background:#ff4d88;
color:white;
cursor:pointer;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(-50px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="luna"></div>

<div class="contenedor">
<h1>Hola, amor ❤️</h1>

<h2>Atziri Danae Garduño Caballero</h2>

<div id="texto"></div>

<button>Continuar ✨</button>
</div>

<script>

// estrellas
for(let i=0;i<300;i++){
let star=document.createElement("div");
star.className="star";
star.style.left=Math.random()*100+"vw";
star.style.top=Math.random()*100+"vh";
document.body.appendChild(star);
}

// texto escribiéndose
const mensaje="Quiero mostrarte algo muy especial...";
let i=0;

function escribir(){
if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,80);
}
}

escribir();

</script>

</body>
</html>
