<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Atziri ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
height:100vh;
background:radial-gradient(circle at top,#1b1b4f,#020111);
color:white;
font-family:'Segoe UI', sans-serif;
}

/* estrellas */
.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
opacity:.7;
}

@keyframes twinkle{
from{transform:scale(1); opacity:.3;}
to{transform:scale(1.8); opacity:1;}
}

/* luna */
.luna{
position:absolute;
top:50px;
right:80px;
width:120px;
height:120px;
background:#fff;
border-radius:50%;
box-shadow:0 0 80px white;
}

/* escenas */
.scene{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
opacity:0;
pointer-events:none;
transition:opacity 1.5s ease;
}

.scene.active{
opacity:1;
pointer-events:auto;
}

/* textos elegantes */
h1,h2,#finalText{
font-family:'Great Vibes', cursive;
text-align:center;
}

h1{font-size:60px;}
h2{font-size:30px;color:#ffd1dc;margin-top:10px;}

#finalText{
font-size:36px;
margin-top:20px;
display:none;
}

/* botones */
button{
padding:12px 35px;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
transition:.3s;
margin-top:20px;
}

#continuar,#continuar2,#si{
background:#ff4d88;
color:white;
}

#no{
background:#444;
color:white;
position:absolute;
}

/* corazones */
.heart{
position:absolute;
color:pink;
font-size:20px;
animation:fall linear forwards;
}

/* girasoles */
.sunflower{
position:absolute;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
from{transform:translateY(-10vh) rotate(0deg); opacity:1;}
to{transform:translateY(110vh) rotate(180deg); opacity:0;}
}

/* zoom final */
.zoom{
animation:zoomIn 2s forwards;
}

@keyframes zoomIn{
from{transform:translate(-50%,-50%) scale(1);}
to{transform:translate(-50%,-50%) scale(1.15);}
}

</style>
</head>

<body>

<div class="luna"></div>

<script>
// estrellas
for(let i=0;i<300;i++){
let s=document.createElement("div");
s.className="star";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
}
</script>

<!-- ESCENA 1 -->
<div class="scene active" id="scene1">
<h1>Hola, amor ❤️</h1>
<h2>Atziri Danae Garduño Caballero</h2>

<div id="texto"></div>
<button id="continuar">Continuar ✨</button>
</div>

<!-- ESCENA 2 -->
<div class="scene" id="scene2">
<h2>Quiero preguntarte algo...</h2>
<button id="continuar2">Continuar ✨</button>
</div>

<!-- ESCENA 3 -->
<div class="scene" id="scene3">
<h2>¿Quieres casarte conmigo? 💍</h2>

<div id="finalText">Quiero casarme contigo ❤️💍</div>

<button id="si">Sí 💍</button>
<button id="no">No 💔</button>
</div>

<script>

/* texto escena 1 */
const msg="Quiero mostrarte algo muy especial...";
let i=0;

function escribir(){
if(i<msg.length){
document.getElementById("texto").innerHTML+=msg.charAt(i);
i++;
setTimeout(escribir,70);
}
}
escribir();

/* escenas */
function showScene(id){
document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* continuar */
document.getElementById("continuar").addEventListener("click", ()=>{
showScene("scene2");
});

/* continuar 2 */
document.getElementById("continuar2").addEventListener("click", ()=>{
showScene("scene3");
});

/* NO que huye */
const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover", ()=>{
noBtn.style.left = Math.random()*80 + "vw";
noBtn.style.top = Math.random()*80 + "vh";
});

/* CORAZONES + GIRASOLES */
function lluviaRomantica(){

for(let i=0;i<12;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(2+Math.random()*3)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}

for(let i=0;i<6;i++){
let s=document.createElement("div");
s.className="sunflower";
s.innerHTML="🌻";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),6000);
}

}

/* SI */
document.getElementById("si").addEventListener("click", ()=>{

document.getElementById("finalText").style.display="block";
document.getElementById("scene3").classList.add("zoom");

document.getElementById("si").style.display="none";
document.getElementById("no").style.display="none";

/* lluvia intensa */
setInterval(lluviaRomantica,600);

});

</script>

</body>
</html>
